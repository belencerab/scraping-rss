<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias de Tecnología</title>
    <style>
        /* --- Variables de Color --- */
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-main);
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            margin-bottom: 50px;
            font-size: 2.5rem;
            font-weight: 600;
        }

        /* --- Grid Container --- */
        .grid-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        /* Responsive: tablets y pantallas medianas (2 columnas) */
        @media (min-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Responsive: pantallas grandes como escritorio (3 columnas) */
        @media (min-width: 1024px) {
            .grid-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* ----- Estilos de la Tarjeta (Card) ----- */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 20px -3px rgba(0, 0, 0, 0.15), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid #e2e8f0;
            display: block;
        }

        .card-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            margin: 0 0 12px 0;
            font-size: 1.25rem;
            line-height: 1.4;
            font-weight: 600;
        }

        .card-title a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s;
        }

        .card-title a:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }

        .card-date {
            margin-top: auto;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }


        .btn {
            display: block;
            text-align: center;
            padding: 12px 20px;
            background-color: var(--primary-color);
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>

<body>
    <h1>Últimas Noticias de <span style="font-weight: 700; color: var(--primary-color);">TECNOLOGÍA</span></h1>

    <div class="grid-container">
        <!-- Bucle For de Jinja2 para recorrer la lista de diccionarios -->
        {% for noticia in noticias %}
        <article class="card">
            <img class="card-image" src="{{ noticia.imagen }}" alt="{{ noticia.titulo }}" loading="lazy">
            <div class="card-content">
                <h2 class="card-title">
                    <a href="{{ noticia.enlace }}" target="_blank" rel="noopener noreferrer">
                        {{ noticia.titulo }}
                    </a>
                </h2>
                <div class="card-date">{{ noticia.fecha }}</div>
            </div>

        </article>
        {% endfor %}
    </div>
</body>

</html>
